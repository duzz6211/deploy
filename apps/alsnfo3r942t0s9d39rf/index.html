<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>517 EXHIBITS — High-impact brand experiences</title>
  <meta name="description" content="517 EXHIBITS turns creative vision into immersive exhibition experiences — trade show displays, custom brand environments and live events, from concept to completion." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script>
    // GitHub Pages SPA 새로고침 대응:
    // 루트 404.html이 딥링크를 ?p=/경로 형태로 넘겨주면 원래 URL로 복원한다.
    (function () {
      var p = new URLSearchParams(location.search).get('p')
      if (p) {
        history.replaceState(null, '', location.pathname.replace(/\/$/, '') + p)
      }
    })()
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
